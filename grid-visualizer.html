<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NaviLake Grid Visualizer</title>
<script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" rel="stylesheet">
<style>
body{margin:0;font-family:system-ui}
#map{position:absolute;inset:0}
#controls{position:absolute;top:12px;left:12px;z-index:10;background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 2px 12px rgba(0,0,0,.2);font-size:13px;max-width:300px}
#controls h3{margin:0 0 8px;font-size:15px}
#controls label{display:flex;align-items:center;gap:8px;margin:4px 0;cursor:pointer}
#stats{margin-top:10px;font-size:11px;color:#666;line-height:1.5}
.legend{display:flex;gap:12px;margin-top:8px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-swatch{width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,.2)}
</style>
</head>
<body>
<div id="map"></div>
<div id="controls">
  <h3>NaviLake Grid Visualizer</h3>
  <label><input type="range" id="opacity" min="0" max="100" value="50" style="width:120px"> Opacity: <span id="opVal">50%</span></label>
  <label><input type="checkbox" id="showGrid" checked> Show grid overlay</label>
  <label><input type="checkbox" id="showLand"> Show land cells (red)</label>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#22c55e"></div> Open water</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f59e0b"></div> Near shore</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ef4444"></div> Land</div>
  </div>
  <div id="stats">Loading grid data...</div>
</div>

<script>
// Load nav-grid.json from same directory
async function loadGrid() {
  const res = await fetch('./src/data/nav-grid.json');
  if (!res.ok) {
    // Try alternate path
    const res2 = await fetch('./nav-grid.json');
    if (!res2.ok) throw new Error('Could not load nav-grid.json. Place this HTML file in your repo root, or put nav-grid.json next to it.');
    return res2.json();
  }
  return res.json();
}

async function init() {
  const gridData = await loadGrid();
  const { bounds, resolution, rows, cols, grid_rle, water_cells } = gridData;

  document.getElementById('stats').innerHTML = `
    Grid: ${cols} × ${rows} = ${(cols*rows).toLocaleString()} cells<br>
    Resolution: ~${(resolution * 111000).toFixed(0)}m per cell<br>
    Water cells: ${water_cells?.toLocaleString() || '?'}<br>
    Bounds: ${bounds.south.toFixed(4)}–${bounds.north.toFixed(4)} lat<br>
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${bounds.west.toFixed(4)}–${bounds.east.toFixed(4)} lng
  `;

  // Decode RLE
  const grid = new Uint8Array(rows * cols);
  let idx = 0;
  for (let i = 0; i < grid_rle.length; i += 2) {
    const val = grid_rle[i];
    const count = grid_rle[i + 1];
    for (let j = 0; j < count; j++) grid[idx++] = val;
  }

  // Render grid to canvas
  const canvas = document.createElement('canvas');
  canvas.width = cols;
  canvas.height = rows;
  const ctx = canvas.getContext('2d');

  function renderCanvas(showLand) {
    const imgData = ctx.createImageData(cols, rows);
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const val = grid[(rows - 1 - row) * cols + col]; // flip Y for image coords
        const px = (row * cols + col) * 4;
        if (val === 1) {
          // Open water — green
          imgData.data[px] = 34; imgData.data[px+1] = 197; imgData.data[px+2] = 94; imgData.data[px+3] = 200;
        } else if (val === 2) {
          // Near shore — amber
          imgData.data[px] = 245; imgData.data[px+1] = 158; imgData.data[px+2] = 11; imgData.data[px+3] = 200;
        } else if (showLand) {
          // Land — red (only if toggled)
          imgData.data[px] = 239; imgData.data[px+1] = 68; imgData.data[px+2] = 68; imgData.data[px+3] = 120;
        } else {
          // Land — transparent
          imgData.data[px+3] = 0;
        }
      }
    }
    ctx.putImageData(imgData, 0, 0);
    return canvas.toDataURL();
  }

  // Init map
  const centerLat = (bounds.south + bounds.north) / 2;
  const centerLng = (bounds.west + bounds.east) / 2;

  const map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        'satellite': {
          type: 'raster',
          tiles: ['https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'],
          tileSize: 256,
          maxzoom: 20,
        }
      },
      layers: [{ id: 'sat', type: 'raster', source: 'satellite' }]
    },
    center: [centerLng, centerLat],
    zoom: 11,
  });

  map.on('load', () => {
    const dataUrl = renderCanvas(false);

    map.addSource('nav-grid', {
      type: 'image',
      url: dataUrl,
      coordinates: [
        [bounds.west, bounds.north], // top-left
        [bounds.east, bounds.north], // top-right
        [bounds.east, bounds.south], // bottom-right
        [bounds.west, bounds.south], // bottom-left
      ]
    });

    map.addLayer({
      id: 'nav-grid-layer',
      type: 'raster',
      source: 'nav-grid',
      paint: { 'raster-opacity': 0.5 }
    });

    // Controls
    const opacitySlider = document.getElementById('opacity');
    const opVal = document.getElementById('opVal');
    opacitySlider.addEventListener('input', () => {
      const v = opacitySlider.value / 100;
      opVal.textContent = opacitySlider.value + '%';
      map.setPaintProperty('nav-grid-layer', 'raster-opacity', v);
    });

    document.getElementById('showGrid').addEventListener('change', (e) => {
      map.setLayoutProperty('nav-grid-layer', 'visibility', e.target.checked ? 'visible' : 'none');
    });

    document.getElementById('showLand').addEventListener('change', (e) => {
      const newUrl = renderCanvas(e.target.checked);
      map.getSource('nav-grid').updateImage({ url: newUrl });
    });

    // Click to inspect cell
    map.on('click', (e) => {
      const lat = e.lngLat.lat;
      const lng = e.lngLat.lng;
      const row = Math.floor((lat - bounds.south) / resolution);
      const col = Math.floor((lng - bounds.west) / resolution);
      if (row >= 0 && row < rows && col >= 0 && col < cols) {
        const val = grid[row * cols + col];
        const labels = { 0: 'LAND', 1: 'OPEN WATER', 2: 'NEAR SHORE' };
        const popup = new maplibregl.Popup({ closeOnClick: true })
          .setLngLat(e.lngLat)
          .setHTML(`<div style="font-family:system-ui;font-size:12px">
            <strong>${labels[val] || 'UNKNOWN'}</strong> (${val})<br>
            Cell: [${row}, ${col}]<br>
            ${lat.toFixed(5)}, ${lng.toFixed(5)}
          </div>`)
          .addTo(map);
      }
    });
  });
}

init().catch(err => {
  document.getElementById('stats').innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
});
</script>
</body>
</html>
